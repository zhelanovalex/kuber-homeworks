apiVersion: v1
kind: Service
metadata:
  name: service-clusterip
  labels:
     app:  multidep-app
spec:
  selector:
    app: multidep-app
  type: ClusterIP 
  ports:
    - name      : nginx-listen
      protocol  : TCP
      port      : 9001
      targetPort: 80
    - name      : multi-listens
      protocol  : TCP
      port      : 9002
      targetPort: 8080
